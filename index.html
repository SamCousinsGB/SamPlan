<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SamPlan — UK Floorplans</title>
  <meta name="description" content="Draw UK floorplans — rooms, real dimensions, furniture and listing exports. Works offline." />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="SamPlan" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header id="toolbar">
    <span class="brand">
      <span class="brand-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3.5 11.2 12 4l8.5 7.2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M5.5 9.8V20h13V9.8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M10 20v-5h4v5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      SamPlan
    </span>

    <div class="seg" role="group" aria-label="Tools">
      <button class="tool-btn" data-tool="property" title="Edit the property outline">Property</button>
      <button class="tool-btn" data-tool="room" title="Draw rooms — drag on the canvas">Room</button>
      <button class="tool-btn" data-tool="furniture" title="Furniture library">Furniture</button>
    </div>

    <span class="spacer"></span>

    <select id="plan-list" class="plan-select" aria-label="Open plan" title="Switch plan"></select>
    <span id="area-readout" title="Total floor area">—</span>
    <button id="btn-export" title="Download PNG (print resolution)">Export</button>
    <button id="btn-zoom-fit" title="Fit plan to view">Fit</button>

    <div class="menu" id="more-menu">
      <button id="btn-more" class="menu-trigger" aria-haspopup="true" aria-expanded="false" title="More">⋯</button>
      <div class="menu-pop" id="more-pop" role="menu" hidden>
        <button id="btn-new" class="menu-item" role="menuitem">New floorplan</button>
        <button id="btn-rename" class="menu-item" role="menuitem">Rename</button>
        <button id="btn-delete" class="menu-item" role="menuitem">Delete</button>
        <hr class="menu-sep" />
        <button id="btn-dims" class="menu-item check" role="menuitemcheckbox">Dimensions</button>
        <button id="btn-preview" class="menu-item check" role="menuitemcheckbox">Listing preview</button>
        <button id="btn-export-furn" class="menu-item check" role="menuitemcheckbox">Furniture in export</button>
        <button id="btn-walls" class="menu-item" role="menuitem">Wall thickness…</button>
        <hr class="menu-sep" />
        <div class="menu-label">Units</div>
        <button class="menu-item check unit-opt" data-unit="m" role="menuitemradio">Metres</button>
        <button class="menu-item check unit-opt" data-unit="ft" role="menuitemradio">Feet</button>
        <button class="menu-item check unit-opt" data-unit="dual" role="menuitemradio">Metres + feet</button>
      </div>
    </div>
  </header>

  <main id="stage">
    <canvas id="canvas"></canvas>

    <!-- Furniture palette (shown when the Furniture tool is active) -->
    <aside id="palette" class="palette" hidden>
      <div class="palette-head">Furniture <small>Click to add · then drag into place · R rotates</small></div>
      <div id="palette-body"></div>
    </aside>

    <!-- Selected-object property panel -->
    <div id="panel" class="panel" hidden>
      <div id="panel-room" hidden>
        <label class="field"><span>Room name</span>
          <input id="room-name" type="text" maxlength="40" /></label>
        <div class="row">
          <label class="field"><span>Width (m)</span>
            <input id="room-w" type="number" min="0.1" max="100" step="0.01" /></label>
          <label class="field"><span>Depth (m)</span>
            <input id="room-h" type="number" min="0.1" max="100" step="0.01" /></label>
        </div>
        <div class="readout" id="room-dims">—</div>
        <label class="field"><span>Colour</span>
          <input id="room-color" type="color" /></label>
        <button id="room-merge" title="Merge with adjoining rooms (open-plan)">Merge open-plan</button>
        <button id="room-unmerge" hidden>Unmerge</button>
        <button id="room-delete" class="danger">Delete room</button>
      </div>
      <div id="panel-furn" hidden>
        <div class="readout" id="furn-name">—</div>
        <div class="readout" id="furn-size">—</div>
        <label class="field"><span>Label (optional)</span>
          <input id="furn-label" type="text" maxlength="40" placeholder="e.g. Wardrobe" /></label>
        <div class="row">
          <button id="furn-rotate">Rotate (R)</button>
          <button id="furn-flip">Flip (F)</button>
        </div>
        <button id="furn-delete" class="danger">Delete</button>
      </div>
      <div id="panel-prop" hidden>
        <div class="readout">Property section</div>
        <div class="row">
          <label class="field"><span>Width (m)</span>
            <input id="prop-w" type="number" min="1" max="100" step="0.1" /></label>
          <label class="field"><span>Depth (m)</span>
            <input id="prop-h" type="number" min="1" max="100" step="0.1" /></label>
        </div>
        <button id="prop-delete" class="danger">Delete section</button>
      </div>
    </div>

    <div id="hud" class="hud" aria-live="polite"></div>
    <div id="toast" class="toast" hidden></div>
    <input id="inline-label" class="inline-label" hidden />

    <!-- Property footprint edit bar -->
    <div id="property-bar" class="property-bar" hidden>
      <span>Draw your property outline — drag to add sections</span>
      <button id="prop-reset" title="Reset to a single rectangle">Reset</button>
      <button id="prop-done" class="primary">Done</button>
    </div>
  </main>

  <dialog id="setup-dialog">
    <form method="dialog" id="setup-form">
      <h2>New floorplan</h2>
      <label class="field"><span>Property name</span>
        <input id="setup-name" type="text" placeholder="e.g. 12 Oak Avenue" maxlength="80" required /></label>
      <div class="row">
        <label class="field"><span>Property width (m)</span>
          <input id="setup-w" type="number" value="8" min="1" max="100" step="0.1" required /></label>
        <label class="field"><span>Property depth (m)</span>
          <input id="setup-h" type="number" value="6" min="1" max="100" step="0.1" required /></label>
      </div>
      <label class="field"><span>Precision (grid)</span>
        <select id="setup-grid">
          <option value="0.05" selected>50 mm — standard</option>
          <option value="0.025">25 mm — fine</option>
          <option value="0.01">10 mm — millimetre work (heavier)</option>
        </select></label>
      <menu class="dialog-actions">
        <button value="cancel" type="button" id="setup-cancel">Cancel</button>
        <button value="confirm" id="setup-create" class="primary">Create</button>
      </menu>
    </form>
  </dialog>

  <script type="module" src="js/main.js"></script>
</body>
</html>
