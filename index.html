<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SamPlan — UK Floorplans</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header id="toolbar">
    <div class="group">
      <strong class="brand">SamPlan</strong>
    </div>

    <div class="group" role="radiogroup" aria-label="Tool" id="tools">
      <button class="tool-btn is-active" data-tool="select" title="Select / move (V)">Select</button>
      <button class="tool-btn" data-tool="room" title="Draw rooms (R)">Room</button>
      <button class="tool-btn" data-tool="furniture" title="Place furniture (F)">Furniture</button>
      <button class="tool-btn" data-tool="compass" title="North point (N)">Compass</button>
      <button class="tool-btn" data-tool="measure" title="Measure (M)">Measure</button>
    </div>

    <div class="group">
      <button id="btn-merge" title="Merge selected room with another (open-plan)">Merge</button>
      <button id="btn-unmerge" title="Unmerge room">Unmerge</button>
    </div>

    <div class="group">
      <button id="btn-new">New</button>
      <select id="plan-list" aria-label="Open plan" title="Open plan"></select>
      <button id="btn-rename" title="Rename plan">Rename</button>
      <button id="btn-delete" title="Delete plan">Delete</button>
    </div>

    <div class="group">
      <select id="unit-select" title="Display units">
        <option value="dual">m + ft</option>
        <option value="m">metres</option>
        <option value="ft">feet</option>
      </select>
      <button id="btn-preview" title="Toggle clean B&amp;W listing preview">Preview</button>
    </div>

    <div class="group">
      <button id="btn-share" title="Copy a view-only link">Share</button>
      <button id="btn-export-png" title="Export PNG (print resolution)">PNG</button>
      <button id="btn-export-jpg" title="Export JPEG">JPG</button>
    </div>

    <div class="group push-right">
      <span id="area-readout" title="Total floor area">—</span>
      <button id="btn-zoom-fit" title="Fit to view">Fit</button>
    </div>
  </header>

  <main id="stage">
    <canvas id="canvas"></canvas>

    <!-- Furniture palette (shown when the Furniture tool is active) -->
    <aside id="palette" class="palette" hidden>
      <div class="palette-head">Furniture <small>click to place · R rotates · Esc cancels</small></div>
      <div id="palette-body"></div>
    </aside>

    <!-- Selected-object property panel -->
    <div id="panel" class="panel" hidden>
      <div id="panel-room" hidden>
        <label class="field"><span>Room name</span>
          <input id="room-name" type="text" maxlength="40" /></label>
        <div class="readout" id="room-dims">—</div>
        <label class="field"><span>Colour</span>
          <input id="room-color" type="color" /></label>
        <button id="room-delete" class="danger">Delete room</button>
      </div>
      <div id="panel-furn" hidden>
        <div class="readout" id="furn-name">—</div>
        <div class="readout" id="furn-size">—</div>
        <button id="furn-rotate">Rotate 90° (R)</button>
        <button id="furn-delete" class="danger">Delete</button>
      </div>
      <div id="panel-compass" hidden>
        <label class="field"><span>North rotation</span>
          <input id="compass-rot" type="range" min="0" max="359" step="1" /></label>
        <button id="compass-delete" class="danger">Remove compass</button>
      </div>
    </div>

    <div id="hud" class="hud" aria-live="polite"></div>
    <div id="toast" class="toast" hidden></div>
    <input id="inline-label" class="inline-label" hidden />

    <!-- View-only banner (share links) -->
    <div id="viewonly-bar" class="viewonly-bar" hidden>
      <span>View-only floorplan</span>
      <button id="btn-copy-edit">Make a copy to edit</button>
      <button id="btn-vo-png">Download PNG</button>
    </div>
  </main>

  <dialog id="setup-dialog">
    <form method="dialog" id="setup-form">
      <h2>New floorplan</h2>
      <label class="field"><span>Plan name</span>
        <input id="setup-name" type="text" value="Untitled" maxlength="60" required /></label>
      <label class="field"><span>Address (optional)</span>
        <input id="setup-address" type="text" maxlength="120" /></label>
      <div class="row">
        <label class="field"><span>Property width (m)</span>
          <input id="setup-w" type="number" value="8" min="1" max="100" step="0.1" required /></label>
        <label class="field"><span>Property depth (m)</span>
          <input id="setup-h" type="number" value="6" min="1" max="100" step="0.1" required /></label>
      </div>
      <label class="field"><span>Grid / snap precision</span>
        <select id="setup-grid">
          <option value="0.1">100 mm (coarse)</option>
          <option value="0.05" selected>50 mm (recommended)</option>
          <option value="0.025">25 mm (fine)</option>
        </select></label>
      <menu class="dialog-actions">
        <button value="cancel" type="button" id="setup-cancel">Cancel</button>
        <button value="confirm" id="setup-create" class="primary">Create</button>
      </menu>
    </form>
  </dialog>

  <script type="module" src="js/main.js"></script>
</body>
</html>
